name: Arxie PR Quality

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to analyze
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: arxie-pr-quality-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  quality:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.base.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout base branch only
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run PR quality robot
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: python .github/scripts/arxie_pr_quality.py
