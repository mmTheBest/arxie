name: arxie-local

services:
  arxie-migrate:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: arxie-migrate
    env_file:
      - env/paperbase.env
    depends_on:
      arxie-postgres:
        condition: service_healthy
    command: ["arxie-db", "upgrade"]
    volumes:
      - ../src:/app/src:ro
      - ../services:/app/services:ro

  arxie-api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: arxie-api
    env_file:
      - env/paperbase.env
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PAPERBASE_MODEL_PROVIDER: ${PAPERBASE_MODEL_PROVIDER:-openai}
      PAPERBASE_MODEL_NAME: ${PAPERBASE_MODEL_NAME:-}
      PAPERBASE_MODEL_CLI_TIMEOUT_SECONDS: ${PAPERBASE_MODEL_CLI_TIMEOUT_SECONDS:-240}
      PAPERBASE_CODEX_COMMAND: ${PAPERBASE_CODEX_COMMAND:-codex}
      PAPERBASE_CLAUDE_COMMAND: ${PAPERBASE_CLAUDE_COMMAND:-claude}
      PAPERBASE_ALLOW_AGENTIC_CLI: ${PAPERBASE_ALLOW_AGENTIC_CLI:-false}
      PAPERBASE_EXPECTED_WORKER_MODEL_PROVIDER: ${PAPERBASE_EXPECTED_WORKER_MODEL_PROVIDER:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      CODEX_HOME: ${CODEX_HOME:-}
    depends_on:
      arxie-migrate:
        condition: service_completed_successfully
      arxie-postgres:
        condition: service_healthy
      arxie-minio:
        condition: service_started
      arxie-redis:
        condition: service_started
    command: ["arxie-api"]
    ports:
      - "8080:8080"
    volumes:
      - ../src:/app/src:ro
      - ../services:/app/services:ro
      - arxie-app-data:/app/data

  arxie-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: arxie-worker
    env_file:
      - env/paperbase.env
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PAPERBASE_MODEL_PROVIDER: ${PAPERBASE_MODEL_PROVIDER:-openai}
      PAPERBASE_MODEL_NAME: ${PAPERBASE_MODEL_NAME:-}
      PAPERBASE_MODEL_CLI_TIMEOUT_SECONDS: ${PAPERBASE_MODEL_CLI_TIMEOUT_SECONDS:-240}
      PAPERBASE_CODEX_COMMAND: ${PAPERBASE_CODEX_COMMAND:-codex}
      PAPERBASE_CLAUDE_COMMAND: ${PAPERBASE_CLAUDE_COMMAND:-claude}
      PAPERBASE_ALLOW_AGENTIC_CLI: ${PAPERBASE_ALLOW_AGENTIC_CLI:-false}
      PAPERBASE_EXPECTED_WORKER_MODEL_PROVIDER: ${PAPERBASE_EXPECTED_WORKER_MODEL_PROVIDER:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      CODEX_HOME: ${CODEX_HOME:-}
    depends_on:
      arxie-migrate:
        condition: service_completed_successfully
      arxie-postgres:
        condition: service_healthy
      arxie-minio:
        condition: service_started
      arxie-redis:
        condition: service_started
    command: ["arxie-worker"]
    volumes:
      - ../src:/app/src:ro
      - ../services:/app/services:ro
      - arxie-app-data:/app/data

  arxie-postgres:
    image: postgres:17
    container_name: arxie-postgres
    env_file:
      - env/postgres.env
    ports:
      - "5432:5432"
    volumes:
      - arxie-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperbase -d paperbase"]
      interval: 10s
      timeout: 5s
      retries: 5

  arxie-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.6
    container_name: arxie-elasticsearch
    env_file:
      - env/elasticsearch.env
    ports:
      - "9200:9200"
    volumes:
      - arxie-elasticsearch-data:/usr/share/elasticsearch/data

  arxie-minio:
    image: minio/minio:latest
    container_name: arxie-minio
    command: server /data --console-address ":9001"
    env_file:
      - env/minio.env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - arxie-minio-data:/data

  arxie-redis:
    image: redis:8
    container_name: arxie-redis
    env_file:
      - env/redis.env
    ports:
      - "6379:6379"
    volumes:
      - arxie-redis-data:/data

volumes:
  arxie-app-data:
  arxie-postgres-data:
  arxie-elasticsearch-data:
  arxie-minio-data:
  arxie-redis-data:
